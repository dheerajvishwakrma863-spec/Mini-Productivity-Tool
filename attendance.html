<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Calc | Hackathon 3.0</title>
    <style>
        /* CSS: Isse App sundar dikhegi */
        body {
            background: radial-gradient(circle, #1a1a2e, #16213e);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 380px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        h2 { color: #4ecca3; margin-bottom: 25px; font-size: 24px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 14px; color: #a2a2a2; margin-bottom: 5px; display: block; }
        input {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            border: 2px solid #16213e;
            color: white;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #4ecca3; }
        button {
            width: 100%;
            padding: 15px;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #45b393; transform: translateY(-2px); }
        
        /* Result Section */
        #result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            display: none; /* Starting mein chhupa rahega */
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .danger { background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #ff7675; }
        .safe { background: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; color: #55efc4; }
        
        .percent-display { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .advice { font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Smart Attendance</h2>
    
    <div class="input-group">
        <label>Total Classes Held</label>
        <input type="number" id="totalClasses" placeholder="e.g. 40">
    </div>

    <div class="input-group">
        <label>Classes Attended</label>
        <input type="number" id="attendedClasses" placeholder="e.g. 28">
    </div>

    <button onclick="calculateAttendance()">Analyze Status</button>

    <div id="result-box">
        <div class="percent-display" id="percentText">0%</div>
        <div class="advice" id="adviceText"></div>
    </div>
</div>

<script>
    // JS Logic: Calculation yahan hogi
    function calculateAttendance() {
        const total = parseInt(document.getElementById('totalClasses').value);
        const attended = parseInt(document.getElementById('attendedClasses').value);
        const target = 75;

        if (!total || isNaN(attended) || attended > total) {
            alert("Please enter valid class numbers!");
            return;
        }

        const currentPct = (attended / total) * 100;
        const resultBox = document.getElementById('result-box');
        const percentText = document.getElementById('percentText');
        const adviceText = document.getElementById('adviceText');

        resultBox.style.display = "block";
        percentText.innerText = currentPct.toFixed(1) + "%";

        if (currentPct < target) {
            // Danger Zone: Kitni aur classes attend karni hain
            resultBox.className = "danger";
            let moreClasses = 0;
            let tempAttended = attended;
            let tempTotal = total;
            
            while (((tempAttended / tempTotal) * 100) < target) {
                tempAttended++;
                tempTotal++;
                moreClasses++;
            }
            adviceText.innerHTML = `🚨 <b>Danger Zone!</b><br>You must attend the next <b>${moreClasses}</b> classes to reach 75%. No more bunks!`;
        } else {
            // Safe Zone: Kitni bunk kar sakte hain
            resultBox.className = "safe";
            let canBunk = 0;
            let tempTotal = total;
            
            while (((attended / (tempTotal + 1)) * 100) >= target) {
                tempTotal++;
                canBunk++;
            }
            
            if (canBunk > 0) {
                adviceText.innerHTML = `✅ <b>Safe Zone!</b><br>Chill! You can safely bunk the next <b>${canBunk}</b> classes without falling below 75%.`;
            } else {
                adviceText.innerHTML = `⚠️ <b>On the edge!</b><br>You are exactly at 75%. Don't miss the next class!`;
            }
        }
    }
</script>

</body>
</html>
